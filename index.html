
<style>

:root{
  --color-bg: #0f1115;
  --color-panel: #161a22;
  --color-panel-2: #1c212c;
  --color-border: #2a3140;
  --color-border-soft: #232938;

  --color-text: #e6e9ef;
  --color-text-secondary: #aab2c0;
  --color-text-tertiary: #7c8596;

  --color-accent: #6ea8fe;
  --color-accent-hover: #8bb8ff;
  --color-danger: #ff6b6b;

  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 6px 20px rgba(0,0,0,0.35);
  --transition: 0.15s ease;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
}

/* Layout */
#app{
  display:flex;
  height:100vh;
  gap:10px;
  padding:10px;
}

#left{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#right{
  width:40%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Panels */
#toolbar, #output-header{
  background: var(--color-panel);
  border:1px solid var(--color-border);
  border-radius: var(--radius);
  padding:8px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:13px;
  box-shadow: var(--shadow);
}

#recipe-list, #recipe-detail, #output{
  background: var(--color-panel);
  border:1px solid var(--color-border);
  border-radius: var(--radius);
  padding:8px;
  box-shadow: var(--shadow);
}

/* Recipe list */
#recipe-list{
  flex:1;
  overflow:auto;
}

.recipe-card{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 8px;
  border-radius: var(--radius-sm);
  cursor:pointer;
  transition: var(--transition);
  border:1px solid transparent;
}

.recipe-card:hover{
  background: var(--color-panel-2);
}

.recipe-card.selected{
  border:1px solid var(--color-accent);
  background: rgba(110,168,254,0.1);
}

.recipe-idx{
  color: var(--color-text-tertiary);
  font-size:11px;
}

.recipe-name{
  flex:1;
  font-size:13px;
}

.recipe-product{
  font-size:11px;
  color: var(--color-text-secondary);
}

.drag-handle{
  cursor:grab;
  color: var(--color-text-tertiary);
}

.del-btn{
  background:none;
  border:none;
  color: var(--color-danger);
  cursor:pointer;
}

/* Drag indicators */
.drag-over-top{border-top:2px solid var(--color-accent)}
.drag-over-bottom{border-bottom:2px solid var(--color-accent)}

/* Detail panel */
#recipe-detail{
  max-height:45%;
  overflow:auto;
}

#detail-title{
  font-size:13px;
  margin-bottom:8px;
  color: var(--color-accent);
}

/* Forms */
.field-row{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}

.field-row label{
  width:140px;
  font-size:12px;
  color: var(--color-text-secondary);
}

.field-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:4px;
}

input, select, textarea{
  background: var(--color-panel-2);
  border:1px solid var(--color-border-soft);
  border-radius: var(--radius-sm);
  color: var(--color-text);
  padding:6px 8px;
  font-size:12px;
  outline:none;
  transition: var(--transition);
}

input:focus, select:focus{
  border-color: var(--color-accent);
}

/* Sections */
.section-label{
  font-size:12px;
  margin:10px 0 6px;
  color: var(--color-text-secondary);
}

/* Ingredients */
.ing-block{
  border:1px solid var(--color-border-soft);
  border-radius: var(--radius-sm);
  padding:8px;
  margin-bottom:6px;
  background: var(--color-panel-2);
}

.ing-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:12px;
}

.ing-fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:6px;
}

.ing-field{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.rm-btn{
  background:none;
  border:none;
  color: var(--color-danger);
  cursor:pointer;
}

/* Output */
#output{
  flex:1;
  resize:none;
  font-family: monospace;
  font-size:12px;
  line-height:1.4;
}

/* Buttons */
button{
  background: var(--color-panel-2);
  border:1px solid var(--color-border-soft);
  border-radius: var(--radius-sm);
  color: var(--color-text);
  padding:4px 8px;
  cursor:pointer;
  transition: var(--transition);
}

button:hover{
  border-color: var(--color-accent);
  color: var(--color-accent-hover);
}

/* Misc */
.hint{
  font-size:11px;
  color: var(--color-text-tertiary);
}

.empty-state{
  text-align:center;
  font-size:12px;
  color: var(--color-text-tertiary);
  padding:20px;
}
</style>


<h2 class="sr-only">RPG Maker Recipe Helper — crea y exporta recetas de crafting</h2>
<div id="app">
  <div id="left">
    <div id="toolbar">
      <span>Recetas</span>
      <button onclick="addRecipe()" style="font-size:12px">+ Nueva</button>
      <button onclick="importJSON()" style="font-size:12px">Importar</button>
      <button onclick="exportJSON()" style="font-size:12px">Exportar</button>
    </div>
    <div id="recipe-list"></div>
    <div id="recipe-detail"></div>
  </div>
  <div id="right">
    <div id="output-header">
      <span>Código generado</span>
      <button onclick="copyOutput()" style="font-size:12px">Copiar</button>
    </div>
    <textarea id="output" readonly placeholder="# El código aparecerá aquí..."></textarea>
  </div>
</div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
let recipes = [];
let selected = null;
let dragSrcId = null;

const TYPES = ['Ítem (0)', 'Arma (1)', 'Armadura (2)'];

function uid(){return '_'+Math.random().toString(36).slice(2,9)}

function addRecipe(){
  const r={id:uid(),name:'Nueva receta',recipeItemId:1,product:{type:0,id:1},ingredients:[{type:0,id:1,qty:1}]};
  recipes.push(r);
  selected=r.id;
  renderAll();
}

function deleteRecipe(id){
  recipes=recipes.filter(r=>r.id!==id);
  if(selected===id) selected=recipes.length?recipes[0].id:null;
  renderAll();
}

function selectRecipe(id){selected=id;renderAll()}

function renderList(){
  const el=document.getElementById('recipe-list');
  if(!recipes.length){el.innerHTML='<div class="empty-state">Sin recetas aún.<br>Haz clic en "+ Nueva" para comenzar.</div>';return}
  el.innerHTML=recipes.map((r,i)=>`
    <div class="recipe-card${selected===r.id?' selected':''}"
      data-id="${r.id}"
      onclick="selectRecipe('${r.id}')">
      <span class="drag-handle" data-id="${r.id}"
        draggable="true"
        onmousedown="event.stopPropagation()"
        ondragstart="handleDragStart(event,'${r.id}')"
        ondragend="handleDragEnd(event)">⠿</span>
      <span class="recipe-idx">#${i}</span>
      <span class="recipe-name">${esc(r.name)}</span>
      <span class="recipe-product">${TYPES[r.product.type].split(' ')[0]} ID:${r.product.id}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteRecipe('${r.id}')">✕</button>
    </div>`).join('');

  el.querySelectorAll('.recipe-card').forEach(card=>{
    card.addEventListener('dragover', handleDragOver);
    card.addEventListener('dragleave', handleDragLeave);
    card.addEventListener('drop', handleDrop);
  });
}

function handleDragStart(e, id){
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(()=>{
    const card = document.querySelector(`.recipe-card[data-id="${id}"]`);
    if(card) card.style.opacity='0.4';
  },0);
}

function handleDragEnd(e){
  document.querySelectorAll('.recipe-card').forEach(c=>{
    c.style.opacity='';
    c.classList.remove('drag-over-top','drag-over-bottom');
  });
  dragSrcId=null;
}

function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  const id=card.dataset.id;
  if(id===dragSrcId) return;
  document.querySelectorAll('.recipe-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
  const rect=card.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  if(e.clientY<mid) card.classList.add('drag-over-top');
  else card.classList.add('drag-over-bottom');
}

function handleDragLeave(e){
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}

function handleDrop(e){
  e.preventDefault();
  const card=e.currentTarget;
  const targetId=card.dataset.id;
  if(!dragSrcId||dragSrcId===targetId) return;
  const si=recipes.findIndex(r=>r.id===dragSrcId);
  const ti=recipes.findIndex(r=>r.id===targetId);
  const rect=card.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  const insertAfter=e.clientY>=mid;
  const [item]=recipes.splice(si,1);
  const newTi=recipes.findIndex(r=>r.id===targetId);
  recipes.splice(insertAfter?newTi+1:newTi,0,item);
  document.querySelectorAll('.recipe-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
  renderAll();
}

function renderDetail(){
  const el=document.getElementById('recipe-detail');
  if(!selected){el.innerHTML='<div style="padding:8px;font-size:12px;color:var(--color-text-tertiary)">Selecciona una receta para editarla.</div>';return}
  const r=recipes.find(x=>x.id===selected);
  if(!r){el.innerHTML='';return}
  const idx=recipes.indexOf(r);
  el.innerHTML=`
    <div id="detail-title">Editando: ${esc(r.name)} — RECIPE[${idx}]</div>

    <div class="field-row">
      <label>Nombre</label>
      <div class="field-col">
        <input value="${esc(r.name)}" oninput="update('name',this.value)">
        <span class="hint">Solo para identificarte aquí, no va al código.</span>
      </div>
    </div>

    <div class="field-row">
      <label>ID del ítem receta</label>
      <div class="field-col">
        <input type="number" min="1" value="${r.recipeItemId}" oninput="update('recipeItemId',+this.value)" style="max-width:80px">
        <span class="hint">El ID del ítem en la pestaña "Items" de la base de datos que representa esta receta (recipe_id).</span>
      </div>
    </div>

    <div class="section-label">Producto final</div>
    <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:8px">
      <div class="ing-fields">
        <div class="ing-field">
          <label>Tipo (product_type)</label>
          <select onchange="update('product.type',+this.value)">
            ${TYPES.map((t,i)=>`<option value="${i}"${r.product.type===i?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="ing-field" style="grid-column:span 2">
          <label>ID en base de datos (product_id)</label>
          <input type="number" min="1" value="${r.product.id}" oninput="update('product.id',+this.value)" style="max-width:90px">
        </div>
      </div>
      <div class="hint" style="margin-top:6px">El objeto que se <strong>crea</strong> al completar la receta. Busca su ID en la pestaña correspondiente (Ítems / Armas / Armaduras) de la base de datos.</div>
    </div>

    <div class="section-label">Ingredientes requeridos</div>
    ${r.ingredients.map((ing,i)=>`
      <div class="ing-block">
        <div class="ing-header">
          <span>Ingrediente ${i+1}</span>
          <button class="rm-btn" onclick="removeIng(${i})">Eliminar</button>
        </div>
        <div class="ing-fields">
          <div class="ing-field">
            <label>Tipo (material_type)</label>
            <select onchange="updateIng(${i},'type',+this.value)">
              ${TYPES.map((t,ti)=>`<option value="${ti}"${ing.type===ti?' selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="ing-field">
            <label>ID en BD (material_id)</label>
            <input type="number" min="1" value="${ing.id}" oninput="updateIng(${i},'id',+this.value)">
          </div>
          <div class="ing-field">
            <label>Cantidad (qty)</label>
            <input type="number" min="1" value="${ing.qty}" oninput="updateIng(${i},'qty',+this.value)">
          </div>
        </div>
        <div class="hint" style="margin-top:6px">Objeto que el jugador debe tener. Su ID está en la pestaña de Ítems/Armas/Armaduras según el tipo elegido.</div>
      </div>`).join('')}
    <button onclick="addIng()" style="font-size:12px;margin-top:2px">+ Agregar ingrediente</button>
  `;
}

function update(path,val){
  const r=recipes.find(x=>x.id===selected);
  if(!r)return;
  if(path.includes('.')){const[a,b]=path.split('.');r[a][b]=val}else r[path]=val;
  renderDetail();renderList();generateOutput();
}

function updateIng(i,key,val){
  const r=recipes.find(x=>x.id===selected);
  if(!r)return;
  r.ingredients[i][key]=val;
  generateOutput();
}

function addIng(){
  const r=recipes.find(x=>x.id===selected);
  if(!r)return;
  r.ingredients.push({type:0,id:1,qty:1});
  renderDetail();generateOutput();
}

function removeIng(i){
  const r=recipes.find(x=>x.id===selected);
  if(!r)return;
  r.ingredients.splice(i,1);
  renderDetail();generateOutput();
}

function generateOutput(){
  if(!recipes.length){document.getElementById('output').value='# Sin recetas definidas.';return}
  const lines=recipes.map((r,i)=>{
    const prod=`[${r.product.type}, ${r.product.id}]`;
    const ings=r.ingredients.map(g=>`[${g.type}, ${g.id}, ${g.qty}]`).join(', ');
    return `RECIPE[${i}] = [${r.recipeItemId}, ${prod}, ${ings}]  # ${r.name}`;
  });
  document.getElementById('output').value=`# ============================\n# Recetas generadas\n# ============================\n\n${lines.join('\n')}`;
}

function copyOutput(){
  const ta=document.getElementById('output');
  navigator.clipboard.writeText(ta.value).catch(()=>{ta.select();document.execCommand('copy')});
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='recetas_rpg.json';a.click();
}

function importJSON(){document.getElementById('file-input').click()}

function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        recipes=data.map(r=>({...r,id:r.id||uid()}));
        selected=recipes.length?recipes[0].id:null;
        renderAll();
      }
    }catch{alert('Archivo JSON inválido.')}
  };
  reader.readAsText(f);e.target.value='';
}

function renderAll(){renderList();renderDetail();generateOutput()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

renderAll();
</script>
